<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eladio & Paola · Aniversario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0a0a;
            --accent-gold: #D4AF37;
            --accent-rose: #E6A8B0;
            --text-light: #f0f0f0;
            --text-dim: #aaaaaa;
            --font-primary: 'Montserrat', sans-serif;
            --font-display: 'Playfair Display', serif;
            --accent-current: var(--accent-gold);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-primary);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .canvas-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(2rem, 10vw, 4rem);
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        h1 span { color: var(--accent-current); }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 0.3em;
            color: var(--text-dim);
            border-bottom: 1px solid var(--accent-current);
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }

        .counter {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--accent-current);
            font-family: var(--font-display);
            transition: transform 0.3s ease;
        }

        .gesture-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--accent-current);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            z-index: 100;
        }

        .floating-message {
            position: fixed;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            border-left: 4px solid var(--accent-current);
            padding: 1.5rem 2.5rem;
            border-radius: 8px;
            font-size: 1.8rem;
            font-family: var(--font-display);
            z-index: 200;
            animation: fadeInOut 3s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 0%); }
            20% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -100%); }
        }

        #video-feed { display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas" class="canvas-layer"></canvas>
    <canvas id="effects-canvas" class="canvas-layer"></canvas>

    <div class="content">
        <h1>ELADIO <span>✦</span> PAOLA</h1>
        <div class="subtitle">NUESTRO TIEMPO</div>
        <div id="counter" class="counter">--</div>
    </div>

    <div class="gesture-indicator">
        GESTO: <span id="gesture-name" style="color:var(--accent-current)">ESPERANDO...</span>
    </div>

    <div id="floating-message-container"></div>
    <video id="video-feed" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        (function() {
            const startDate = new Date(2025, 7, 6); // 6 de agosto 2025
            const accentColors = ['#D4AF37', '#E6A8B0'];
            let accentIndex = 0;
            let currentAccent = accentColors[0];
            
            const lovePhrases = [
                "Eres mi lugar favorito", "Cada segundo cuenta", 
                "Por mil meses más", "El mejor equipo", 
                "Te amo, Paola", "Te amo, Eladio"
            ];

            const bgCanvas = document.getElementById('bg-canvas');
            const fxCanvas = document.getElementById('effects-canvas');
            const ctxBg = bgCanvas.getContext('2d');
            const ctxFx = fxCanvas.getContext('2d');
            const counterEl = document.getElementById('counter');
            const gestureNameSpan = document.getElementById('gesture-name');
            const videoElement = document.getElementById('video-feed');

            // --- SISTEMA DE PARTÍCULAS ---
            let particles = [];
            const PARTICLE_COUNT = 180;
            let isMorphing = false;

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        targetX: 0,
                        targetY: 0,
                        vx: (Math.random() - 0.5) * 1.2,
                        vy: (Math.random() - 0.5) * 1.2,
                        radius: Math.random() * 2 + 1,
                        alpha: Math.random() * 0.5 + 0.2
                    });
                }
            }

            function getHeartPoint(t, scale) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                return { x: x * scale, y: y * scale };
            }

            function setMorph(active) {
                isMorphing = active;
                if (active) {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    particles.forEach((p, i) => {
                        const t = (i / PARTICLE_COUNT) * Math.PI * 2;
                        const point = getHeartPoint(t, window.innerWidth < 600 ? 10 : 15);
                        p.targetX = centerX + point.x;
                        p.targetY = centerY + point.y;
                    });
                }
            }

            // --- GESTOS ---
            function detectGestures(landmarks, handedness) {
                const thumbTip = landmarks[4], indexTip = landmarks[8], middleTip = landmarks[12];
                const indexPip = landmarks[6], middlePip = landmarks[10];
                
                const indexExt = indexTip.y < indexPip.y;
                const middleExt = middleTip.y < middlePip.y;
                const thumbIndexDist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);

                if (thumbIndexDist < 0.06 && !middleExt) return 'HEART';
                if (indexExt && middleExt && landmarks[16].y > landmarks[14].y) return 'VICTORY';
                if (indexExt && !middleExt) return 'POINTING';
                return 'NONE';
            }

            function handleGesture(gesture) {
                gestureNameSpan.innerText = gesture;
                if (gesture === 'HEART') {
                    if (!isMorphing) {
                        setMorph(true);
                        showPhrase();
                    }
                } else if (gesture === 'POINTING') {
                    setMorph(false);
                    accentIndex = (accentIndex + 1) % accentColors.length;
                    currentAccent = accentColors[accentIndex];
                    document.documentElement.style.setProperty('--accent-current', currentAccent);
                } else {
                    setMorph(false);
                }
            }

            function showPhrase() {
                const phrase = lovePhrases[Math.floor(Math.random() * lovePhrases.length)];
                const container = document.getElementById('floating-message-container');
                const div = document.createElement('div');
                div.className = 'floating-message';
                div.innerText = phrase;
                container.appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }

            // --- MEDIAPIPE SETUP ---
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
            hands.onResults(results => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const gesture = detectGestures(results.multiHandLandmarks[0], results.multiHandedness[0].label);
                    handleGesture(gesture);
                } else {
                    handleGesture('MOVER MANO');
                }
            });

            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();

            // --- LOOP ANIMACIÓN ---
            function animate() {
                ctxBg.fillStyle = '#0a0a0a';
                ctxBg.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                
                particles.forEach(p => {
                    if (isMorphing) {
                        p.x += (p.targetX - p.x) * 0.1;
                        p.y += (p.targetY - p.y) * 0.1;
                    } else {
                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0 || p.x > bgCanvas.width) p.vx *= -1;
                        if (p.y < 0 || p.y > bgCanvas.height) p.vy *= -1;
                    }
                    ctxBg.beginPath();
                    ctxBg.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                    ctxBg.fillStyle = isMorphing ? currentAccent : `rgba(212, 175, 55, ${p.alpha})`;
                    ctxBg.fill();
                });

                requestAnimationFrame(animate);
            }

            function updateCounter() {
                const now = new Date();
                const diff = now - startDate;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const months = Math.floor(days / 30.44);
                const remainingDays = Math.floor(days % 30.44);
                counterEl.innerText = `${months} meses y ${remainingDays} días`;
            }

            window.addEventListener('resize', () => {
                bgCanvas.width = window.innerWidth;
                bgCanvas.height = window.innerHeight;
                initParticles();
            });

            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            initParticles();
            animate();
            updateCounter();
            setInterval(updateCounter, 1000 * 60 * 60);
        })();
    </script>
</body>
</html>
