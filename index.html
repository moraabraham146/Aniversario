<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Para Paola · De Eladio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #070707;
            --accent-gold: #D4AF37;
            --accent-rose: #FFB7C5;
            --text-light: #ffffff;
            --font-display: 'Playfair Display', serif;
            --accent-current: var(--accent-gold);
        }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .canvas-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .content { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        h1 { font-family: var(--font-display); font-size: clamp(2rem, 10vw, 4.5rem); letter-spacing: 0.15em; margin-bottom: 0.5rem; }
        h1 span { color: var(--accent-current); }
        .subtitle { font-size: 0.8rem; letter-spacing: 0.4em; color: #aaa; border-bottom: 1px solid var(--accent-current); padding-bottom: 0.5rem; margin-bottom: 2rem; text-transform: uppercase; }
        .counter { background: rgba(255, 255, 255, 0.05); padding: 1rem 2rem; border-radius: 50px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); font-size: 1.2rem; }
        .counter b { color: var(--accent-current); }
        .gesture-indicator { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border: 1px solid var(--accent-current); padding: 0.6rem 1.5rem; border-radius: 30px; font-size: 0.7rem; z-index: 100; }
        .floating-message { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 1px solid var(--accent-current); padding: 2rem; border-radius: 15px; font-size: 1.8rem; font-family: var(--font-display); z-index: 200; text-align: center; animation: heartPop 3s ease forwards; }
        @keyframes heartPop { 0% { opacity:0; transform: translate(-50%,-20%) scale(0.8); } 15% { opacity:1; transform: translate(-50%,-50%) scale(1); } 85% { opacity:1; transform: translate(-50%,-50%) scale(1); } 100% { opacity:0; transform: translate(-50%,-80%) scale(0.9); } }
        #video-feed { display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas" class="canvas-layer"></canvas>
    <div class="content">
        <div class="subtitle">Para mi persona favorita</div>
        <h1>ELADIO <span>&</span> PAOLA</h1>
        <div id="counter" class="counter">Calculando...</div>
    </div>
    <div class="gesture-indicator">
        ELADIO: <span id="gesture-name" style="color:var(--accent-current)">ESPERANDO MANO...</span>
    </div>
    <div id="floating-message-container"></div>
    <video id="video-feed" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        (function() {
            const startDate = new Date(2025, 7, 6);
            const paolaPhrases = ["¡Eres mi estrella, Paola!", "Te amo infinito", "Tú iluminas mi vida", "Juntos siempre ❤️"];
            const bgCanvas = document.getElementById('bg-canvas');
            const ctx = bgCanvas.getContext('2d');
            const gestureNameSpan = document.getElementById('gesture-name');

            let particles = [];
            let isMorphing = false;
            let currentShape = 'none';

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * window.innerWidth;
                    this.y = Math.random() * window.innerHeight;
                    this.vx = (Math.random() - 0.5) * 1.5;
                    this.vy = (Math.random() - 0.5) * 1.5;
                    this.radius = Math.random() * 2 + 1;
                    this.tx = 0; this.ty = 0;
                }
                update() {
                    if (isMorphing) {
                        this.x += (this.tx - this.x) * 0.12;
                        this.y += (this.ty - this.y) * 0.12;
                    } else {
                        this.x += this.vx; this.y += this.vy;
                        if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
                        if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = isMorphing ? "var(--accent-rose)" : "var(--accent-gold)";
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for(let i=0; i<250; i++) particles.push(new Particle());
            }

            function setShape(shape) {
                if (shape === currentShape) return;
                currentShape = shape;
                isMorphing = (shape !== 'none');
                const cx = window.innerWidth / 2, cy = window.innerHeight / 2;

                particles.forEach((p, i) => {
                    let angle = (i / particles.length) * Math.PI * 2;
                    if (shape === 'HEART') {
                        const x = 16 * Math.pow(Math.sin(angle), 3);
                        const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));
                        p.tx = cx + x * 15; p.ty = cy + y * 15;
                    } else if (shape === 'STAR') {
                        let r = (i % 2 === 0) ? 200 : 80;
                        p.tx = cx + r * Math.cos(angle); p.ty = cy + r * Math.sin(angle);
                    }
                });
            }

            function detectGestures(landmarks) {
                const thumb = landmarks[4], index = landmarks[8], middle = landmarks[12];
                const distThumbIndex = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                const indexExtended = index.y < landmarks[6].y;
                const middleClosed = middle.y > landmarks[10].y;

                if (distThumbIndex < 0.08) return 'HEART';
                if (indexExtended && middleClosed) return 'STAR';
                return 'none';
            }

            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.4, minTrackingConfidence: 0.4 });
            hands.onResults(res => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const g = detectGestures(res.multiHandLandmarks[0]);
                    gestureNameSpan.innerText = g === 'none' ? "MUEVE TU MANO" : g;
                    if (g === 'HEART') { setShape('HEART'); if(Math.random() < 0.02) showMsg(); }
                    else if (g === 'STAR') setShape('STAR');
                    else setShape('none');
                } else {
                    gestureNameSpan.innerText = "ESPERANDO MANO...";
                    setShape('none');
                }
            });

            const camera = new Camera(document.getElementById('video-feed'), {
                onFrame: async () => { await hands.send({image: document.getElementById('video-feed')}); },
                width: 640, height: 480
            });
            camera.start();

            function showMsg() {
                if (document.querySelector('.floating-message')) return;
                const div = document.createElement('div');
                div.className = 'floating-message';
                div.innerText = paolaPhrases[Math.floor(Math.random()*paolaPhrases.length)];
                document.getElementById('floating-message-container').appendChild(div);
                setTimeout(() => div.remove(), 3000);
            }

            function animate() {
                ctx.fillStyle = 'rgba(7,7,7,0.3)';
                ctx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => { bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight; initParticles(); });
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            initParticles(); animate();

            setInterval(() => {
                const diff = new Date() - startDate;
                const m = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
                const d = Math.floor((diff / (1000 * 60 * 60 * 24)) % 30.44);
                document.getElementById('counter').innerHTML = `Llevamos <b>${m}</b> meses y <b>${d}</b> días`;
            }, 1000);
        })();
    </script>
</body>
</html>
