<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eladio & Paola - Feliz Cumple Mes</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        #ui-layer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: white; pointer-events: none; z-index: 10;
        }
        h1 { font-size: 3.5rem; margin: 0; letter-spacing: 8px; text-shadow: 0 0 20px #ff1493; opacity: 0.9; }
        #gesture-text { font-size: 1.5rem; color: #ff69b4; margin-top: 20px; font-weight: 300; }
        /* Cámara oculta pero funcional */
        #webcam { display: none; }
        .loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff1493; display: flex;
            justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

<div id="loading" class="loading"><h2>Preparando la sorpresa...</h2></div>

<div id="ui-layer">
    <h1 id="main-title">ELADIO & PAOLA</h1>
    <p id="gesture-text">Mueve tu mano frente a la pantalla</p>
</div>

<video id="webcam" autoplay playsinline></video>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
    const videoElement = document.getElementById('webcam');
    const loadingScreen = document.getElementById('loading');
    const gestureText = document.getElementById('gesture-text');
    const mainTitle = document.getElementById('main-title');
    
    let scene, camera, renderer, particles;
    const PARTICLE_COUNT = 25000;
    let targetPositions = { heart: [], random: [], date: [], circle: [] };
    let currentMode = 'random';

    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.z = 500;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i*3] = (Math.random() - 0.5) * 1000;
            positions[i*3+1] = (Math.random() - 0.5) * 1000;
            positions[i*3+2] = (Math.random() - 0.5) * 1000;
            colors[i*3] = 1; colors[i*3+1] = 0.2; colors[i*3+2] = 0.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        particles = new THREE.Points(geometry, new THREE.PointsMaterial({
            size: 1.5, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.7
        }));
        scene.add(particles);
        createShapes();
        animate();
    }

    function createShapes() {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            // Corazón
            const t = Math.random() * Math.PI * 2;
            const xH = 16 * Math.pow(Math.sin(t), 3);
            const yH = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            targetPositions.heart.push(new THREE.Vector3(xH * 15, yH * 15, 0));

            // Fecha (Línea etérea)
            targetPositions.date.push(new THREE.Vector3((Math.random()-0.5)*500, (Math.random()-0.5)*20, 0));

            // Círculo (Anillo de compromiso/unión)
            const angle = Math.random() * Math.PI * 2;
            targetPositions.circle.push(new THREE.Vector3(Math.cos(angle)*250, Math.sin(angle)*250, (Math.random()-0.5)*50));

            // Nube
            targetPositions.random.push(new THREE.Vector3((Math.random()-0.5)*1000, (Math.random()-0.5)*800, (Math.random()-0.5)*500));
        }
    }

    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.8 });

    hands.onResults((res) => {
        if (res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
            const l = res.multiHandLandmarks[0];
            const finger = (id) => l[id].y < l[id-2].y; // Dedo levantado

            // GESTOS:
            if (finger(8) && finger(12) && !finger(16)) { // PAZ -> Corazón
                currentMode = 'heart';
                gestureText.innerText = "❤️ Feliz Cumple Mes ❤️";
            } else if (finger(8) && !finger(12)) { // ÍNDICE -> Fecha
                currentMode = 'date';
                gestureText.innerText = "Nuestra Fecha: 08/06/2025";
            } else if (finger(8) && finger(12) && finger(16) && finger(20)) { // PALMA -> Círculo
                currentMode = 'circle';
                gestureText.innerText = "Unidos por siempre";
            } else if (l[8].y > l[5].y) { // PUÑO -> Nube
                currentMode = 'random';
                gestureText.innerText = "Polvo de estrellas";
            }
            
            // Seguimiento de partículas a la mano
            particles.position.x += ((l[9].x - 0.5) * -800 - particles.position.x) * 0.1;
            particles.position.y += ((l[9].y - 0.5) * -600 - particles.position.y) * 0.1;
        }
    });

    const cameraInput = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); loadingScreen.style.display = 'none'; },
        width: 640, height: 480
    });
    cameraInput.start();

    function animate() {
        requestAnimationFrame(animate);
        const pos = particles.geometry.attributes.position;
        const target = targetPositions[currentMode];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            pos.array[i*3] += (target[i].x - pos.array[i*3]) * 0.1;
            pos.array[i*3+1] += (target[i].y - pos.array[i*3+1]) * 0.1;
            pos.array[i*3+2] += (target[i].z - pos.array[i*3+2]) * 0.1;
        }
        pos.needsUpdate = true;
        particles.rotation.y += 0.002;
        renderer.render(scene, camera);
    }

    initThree();
</script>
</body>
</html>
