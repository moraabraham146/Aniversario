<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Para Paola · De Eladio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Tu CSS Original */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0a;
      --accent-gold: #D4AF37;
      --accent-rose: #E6A8B0;
      --text-light: #f0f0f0;
      --text-dim: #aaaaaa;
      --font-primary: 'Montserrat', sans-serif;
      --font-display: 'Playfair Display', serif;
      --accent-current: var(--accent-gold);
      --transition-smooth: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: var(--font-primary);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    .canvas-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .content {
      position: relative; z-index: 10; min-height: 100vh; display: flex;
      flex-direction: column; justify-content: center; align-items: center; text-align: center;
      padding: 2rem 1.5rem; pointer-events: none;
    }
    .content > * { pointer-events: auto; }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 12vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      color: var(--text-light);
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }
    h1 span { color: var(--accent-current); font-weight: 400; transition: var(--transition-smooth); }
    .subtitle {
      font-size: 1.2rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 3rem; border-bottom: 1px solid var(--accent-current);
      padding-bottom: 0.8rem; display: inline-block;
    }
    .counter {
      font-size: 2.5rem; font-weight: 600; line-height: 1.2; margin: 2rem 0;
      color: var(--accent-current); font-family: var(--font-display);
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }
    .gesture-indicator {
      position: fixed; bottom: 20px; right: 20px;
      background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(8px);
      border: 1px solid var(--accent-current); border-radius: 40px;
      padding: 0.6rem 1.5rem; color: var(--text-light); font-size: 0.9rem; z-index: 100;
    }
    .floating-message {
      position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); border-left: 4px solid var(--accent-current);
      padding: 1rem 2rem; border-radius: 8px; font-size: 1.5rem;
      color: #fff; font-family: var(--font-display); z-index: 200;
      animation: fadeInOut 2.5s ease forwards;
    }
    @keyframes fadeInOut {
      0% { opacity: 0; transform: translate(-50%, 30%); }
      15% { opacity: 1; transform: translate(-50%, -50%); }
      85% { opacity: 1; transform: translate(-50%, -50%); }
      100% { opacity: 0; transform: translate(-50%, -80%); }
    }
    #video-feed { display: none; }
  </style>
</head>
<body>
  <canvas id="bg-canvas" class="canvas-layer"></canvas>
  <canvas id="effects-canvas" class="canvas-layer"></canvas>

  <div class="content">
    <h1>ELADIO <span>✦</span> PAOLA</h1>
    <div class="subtitle">NUESTRO TIEMPO JUNTOS</div>
    <div class="counter" id="counter">--</div>
  </div>

  <div class="gesture-indicator" id="gesture-indicator">
    ✦ GESTO: <span id="gesture-name">---</span>
  </div>

  <div id="floating-message-container" style="position: fixed; top:0; left:0; width:100%; height:0; z-index:200; pointer-events: none;"></div>
  <video id="video-feed" playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    (function() {
      const startDate = new Date(2025, 7, 6); // 6 de Agosto 2025
      let particles = [];
      const PARTICLE_COUNT = 250;
      let isMorphing = false;
      let currentAccent = '#D4AF37';
      const paolaPhrases = ["Para mi princesa Paola ❤️", "Eres mi vida entera", "Te amo infinito", "Juntos siempre"];

      const bgCanvas = document.getElementById('bg-canvas');
      const ctxBg = bgCanvas.getContext('2d');
      const counterEl = document.getElementById('counter');
      const gestureNameSpan = document.getElementById('gesture-name');
      const videoElement = document.getElementById('video-feed');

      // --- INICIALIZACIÓN DE PARTÍCULAS (Tu lógica original mejorada) ---
      function initParticles() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            tx: 0, ty: 0, // Target para morphing
            vx: (Math.random() - 0.5) * 1.2,
            vy: (Math.random() - 0.5) * 1.2,
            radius: Math.random() * 2 + 1,
            alpha: Math.random() * 0.6 + 0.2,
          });
        }
      }

      function updateTimeCounter() {
        const now = new Date();
        const diffDays = Math.floor((now - startDate) / (1000 * 60 * 60 * 24));
        const months = Math.floor(diffDays / 30.44);
        const days = Math.floor(diffDays % 30.44);
        counterEl.innerText = `${months} meses y ${days} días`;
      }

      // --- LÓGICA DE FORMAS (Corazón y Estrella) ---
      function setMorphShape(shape) {
        isMorphing = (shape !== 'none');
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;

        particles.forEach((p, i) => {
          let angle = (i / PARTICLE_COUNT) * Math.PI * 2;
          if (shape === 'heart') {
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));
            p.tx = cx + x * 15; p.ty = cy + y * 15;
          } else if (shape === 'star') {
            let r = (i % 2 === 0) ? 200 : 80;
            p.tx = cx + r * Math.cos(angle - Math.PI/2); p.ty = cy + r * Math.sin(angle - Math.PI/2);
          }
        });
      }

      // --- DETECCIÓN DE GESTOS ---
      function detectGestures(landmarks) {
        const thumb = landmarks[4], index = landmarks[8], middle = landmarks[12];
        const distThumbIndex = Math.hypot(thumb.x - index.x, thumb.y - index.y);
        if (distThumbIndex < 0.08) return 'HEART';
        if (index.y < landmarks[6].y && middle.y > landmarks[10].y) return 'STAR';
        return 'none';
      }

      function handleGesture(gesture) {
        gestureNameSpan.innerText = gesture === 'none' ? 'Buscando...' : gesture;
        if (gesture === 'HEART') {
          setMorphShape('heart');
          document.documentElement.style.setProperty('--accent-current', '#E6A8B0');
          if(Math.random() < 0.02) showLoveMsg();
        } else if (gesture === 'STAR') {
          setMorphShape('star');
          document.documentElement.style.setProperty('--accent-current', '#FFFACD');
        } else {
          setMorphShape('none');
          document.documentElement.style.setProperty('--accent-current', '#D4AF37');
        }
      }

      function showLoveMsg() {
        if (document.querySelector('.floating-message')) return;
        const msg = document.createElement('div');
        msg.className = 'floating-message';
        msg.innerText = paolaPhrases[Math.floor(Math.random() * paolaPhrases.length)];
        document.getElementById('floating-message-container').appendChild(msg);
        setTimeout(() => msg.remove(), 2500);
      }

      // --- MEDIAPIPE ---
      const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
      hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.5 });
      hands.onResults(res => {
        if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
          handleGesture(detectGestures(res.multiHandLandmarks[0]));
        } else {
          handleGesture('none');
        }
      });

      new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
      }).start();

      // --- ANIMACIÓN PRINCIPAL ---
      function animate() {
        ctxBg.fillStyle = 'rgba(10, 10, 10, 0.3)';
        ctxBg.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        particles.forEach(p => {
          if (isMorphing) {
            p.x += (p.tx - p.x) * 0.12;
            p.y += (p.ty - p.y) * 0.12;
          } else {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > window.innerWidth) p.vx *= -1;
            if (p.y < 0 || p.y > window.innerHeight) p.vy *= -1;
          }
          ctxBg.beginPath();
          ctxBg.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctxBg.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-current');
          ctxBg.fill();
        });
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', () => {
        bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
        initParticles();
      });

      bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
      initParticles();
      updateTimeCounter();
      animate();
    })();
  </script>
</body>
</html>
