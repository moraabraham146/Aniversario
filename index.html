<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Para Paola · De Eladio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #070707;
            --accent-gold: #D4AF37;
            --accent-rose: #FFB7C5;
            --text-light: #ffffff;
            --font-display: 'Playfair Display', serif;
            --accent-current: var(--accent-gold);
        }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Montserrat', sans-serif; overflow: hidden; min-height: 100vh; }
        .canvas-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .content { position: relative; z-index: 10; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; pointer-events: none;}
        h1 { font-family: var(--font-display); font-size: clamp(2rem, 10vw, 4.5rem); letter-spacing: 0.15em; margin-bottom: 0.5rem; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        h1 span { color: var(--accent-gold); }
        .subtitle { font-size: 0.8rem; letter-spacing: 0.4em; color: #aaa; border-bottom: 1px solid var(--accent-gold); padding-bottom: 0.5rem; margin-bottom: 2rem; text-transform: uppercase; }
        .counter { background: rgba(255, 255, 255, 0.05); padding: 1rem 2rem; border-radius: 50px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem; font-weight: 300; }
        .counter b { color: var(--accent-gold); font-weight: 600; }
        .gesture-indicator { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 1px solid var(--accent-gold); padding: 0.6rem 1.5rem; border-radius: 30px; font-size: 0.7rem; z-index: 100; color: #ccc; letter-spacing: 0.1em;}
        .floating-message { position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 1px solid var(--accent-gold); padding: 2rem; border-radius: 15px; font-size: 1.8rem; font-family: var(--font-display); z-index: 200; text-align: center; animation: heartPop 3.5s ease forwards; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
        @keyframes heartPop { 0% { opacity:0; transform: translate(-50%,-20%) scale(0.8); } 15% { opacity:1; transform: translate(-50%,-50%) scale(1); } 85% { opacity:1; transform: translate(-50%,-50%) scale(1); } 100% { opacity:0; transform: translate(-50%,-80%) scale(0.9); } }
        #video-feed { display: none; }
    </style>
</head>
<body>
    <canvas id="bg-canvas" class="canvas-layer"></canvas>
    <div class="content">
        <div class="subtitle">Para mi persona favorita</div>
        <h1>ELADIO <span>&</span> PAOLA</h1>
        <div id="counter" class="counter">Cargando nuestro tiempo...</div>
    </div>
    <div class="gesture-indicator">
        ELADIO: <span id="gesture-name" style="color:var(--accent-gold); font-weight:bold;">ESPERANDO MANO...</span>
    </div>
    <div id="floating-message-container"></div>
    <video id="video-feed" playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        (function() {
            const startDate = new Date(2025, 7, 6); // 6 de Agosto 2025
            const paolaPhrases = ["¡Eres mi estrella, Paola!", "Te amo infinito ❤️", "Tú iluminas mi vida", "Siempre juntos, princesa"];
            const bgCanvas = document.getElementById('bg-canvas');
            const ctx = bgCanvas.getContext('2d');
            const gestureNameSpan = document.getElementById('gesture-name');

            let particles = [];
            let isMorphing = false;
            let currentShape = 'none';
            let particleColor = "#D4AF37"; // Dorado por defecto

            class Particle {
                constructor() {
                    this.init();
                }
                init() {
                    this.x = Math.random() * window.innerWidth;
                    this.y = Math.random() * window.innerHeight;
                    // Velocidad base más notable
                    this.vx = (Math.random() - 0.5) * 1.8;
                    this.vy = (Math.random() - 0.5) * 1.8;
                    this.radius = Math.random() * 2.5 + 1;
                    this.alpha = Math.random() * 0.5 + 0.3;
                    this.tx = this.x; this.ty = this.y;
                }
                update() {
                    if (isMorphing) {
                        // Atracción fuerte y rápida hacia la forma
                        this.x += (this.tx - this.x) * 0.15;
                        this.y += (this.ty - this.y) * 0.15;
                    } else {
                        // Movimiento constante flotante
                        this.x += this.vx; this.y += this.vy;
                        // Rebote suave en los bordes
                        if (this.x < 0 || this.x > window.innerWidth) this.vx *= -1;
                        if (this.y < 0 || this.y > window.innerHeight) this.vy *= -1;
                    }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    // Usar color actual con opacidad base
                    ctx.fillStyle = `rgba(${this.hexToRgb(particleColor)}, ${this.alpha})`;
                    if (isMorphing) {
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = particleColor;
                    } else {
                        ctx.shadowBlur = 0;
                    }
                    ctx.fill();
                }
                hexToRgb(hex) {
                    const r = parseInt(hex.slice(1, 3), 16);
                    const g = parseInt(hex.slice(3, 5), 16);
                    const b = parseInt(hex.slice(5, 7), 16);
                    return `${r}, ${g}, ${b}`;
                }
            }

            function initParticles() {
                particles = [];
                // Aumentar número para mejor definición de formas
                for(let i=0; i<300; i++) particles.push(new Particle());
            }

            function setShape(shape) {
                if (shape === currentShape) return;
                currentShape = shape;
                isMorphing = (shape !== 'none');
                const cx = window.innerWidth / 2, cy = window.innerHeight / 2;

                if (shape === 'HEART') {
                    particleColor = "#FFB7C5"; // Rosa para el corazón
                    particles.forEach((p, i) => {
                        let angle = (i / particles.length) * Math.PI * 2;
                        const x = 16 * Math.pow(Math.sin(angle), 3);
                        const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));
                        p.tx = cx + x * 18; p.ty = cy + y * 18; // Escala ajustada
                    });
                } else if (shape === 'STAR') {
                    particleColor = "#FFFACD"; // Amarillo pálido para estrella
                    particles.forEach((p, i) => {
                        let angle = (i / particles.length) * Math.PI * 2;
                        // Estrella de 5 puntas paramétrica simplificada
                        let r = (i % 2 === 0) ? 220 : 90; 
                        p.tx = cx + r * Math.cos(angle - Math.PI/2); p.ty = cy + r * Math.sin(angle - Math.PI/2);
                    });
                } else {
                    particleColor = "#D4AF37"; // Volver a dorado
                }
            }

            function detectGestures(landmarks) {
                const thumb = landmarks[4], index = landmarks[8], middle = landmarks[12];
                const distThumbIndex = Math.hypot(thumb.x - index.x, thumb.y - index.y);
                const indexExtended = index.y < landmarks[6].y;
                const middleClosed = middle.y > landmarks[10].y;

                // Umbrales ajustados para mejor sensibilidad
                if (distThumbIndex < 0.08) return 'HEART';
                if (indexExtended && middleClosed && distThumbIndex > 0.1) return 'STAR';
                return 'none';
            }

            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(res => {
                if (res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                    const g = detectGestures(res.multiHandLandmarks[0]);
                    gestureNameSpan.innerText = g === 'none' ? "MUEVE TU MANO" : g.replace('HEART', 'CORAZÓN').replace('STAR', 'ESTRELLA');
                    if (g === 'HEART') { setShape('HEART'); if(Math.random() < 0.015) showMsg(); }
                    else if (g === 'STAR') setShape('STAR');
                    else setShape('none');
                } else {
                    gestureNameSpan.innerText = "ESPERANDO MANO...";
                    setShape('none');
                }
            });

            const camera = new Camera(document.getElementById('video-feed'), {
                onFrame: async () => { await hands.send({image: document.getElementById('video-feed')}); },
                width: 640, height: 480
            });
            camera.start();

            function showMsg() {
                if (document.querySelector('.floating-message')) return;
                const div = document.createElement('div');
                div.className = 'floating-message';
                div.style.borderColor = particleColor; // Borde del color de la forma
                div.innerText = paolaPhrases[Math.floor(Math.random()*paolaPhrases.length)];
                document.getElementById('floating-message-container').appendChild(div);
                setTimeout(() => div.remove(), 3500);
            }

            function animate() {
                // Fondo con estela suave para movimiento fluido
                ctx.fillStyle = 'rgba(7,7,7,0.35)';
                ctx.fillRect(0,0,bgCanvas.width, bgCanvas.height);
                
                particles.forEach(p => { 
                    p.update(); 
                    p.draw(); 
                });
                requestAnimationFrame(animate);
            }

            function updateCounter() {
                const diff = new Date() - startDate;
                if (diff < 0) {
                    document.getElementById('counter').innerHTML = "¡Pronto empezará nuestro tiempo!";
                    return;
                }
                const daysTotal = Math.floor(diff / (1000 * 60 * 60 * 24));
                const months = Math.floor(daysTotal / 30.44);
                const days = Math.floor(daysTotal % 30.44);
                document.getElementById('counter').innerHTML = `Llevamos <b>${months}</b> meses y <b>${days}</b> días juntos`;
            }

            window.addEventListener('resize', () => { 
                bgCanvas.width = window.innerWidth; 
                bgCanvas.height = window.innerHeight; 
                initParticles(); 
            });
            
            bgCanvas.width = window.innerWidth; 
            bgCanvas.height = window.innerHeight;
            initParticles(); 
            animate();
            updateCounter();
            setInterval(updateCounter, 1000 * 60 * 60); // Actualizar cada hora
        })();
    </script>
</body>
</html>
