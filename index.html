<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Para Paola · De Eladio</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-dark: #0a0a0a;
      --accent-gold: #D4AF37;
      --accent-rose: #FFB7C5;
      --accent-star: #FFFACD;
      --accent-current: var(--accent-gold);
    }
    body { background-color: var(--bg-dark); color: #f0f0f0; font-family: 'Montserrat', sans-serif; overflow: hidden; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    
    .content { 
      position: relative; z-index: 10; min-height: 100vh; 
      display: flex; flex-direction: column; justify-content: center; 
      align-items: center; text-align: center; pointer-events: none; 
    }
    
    h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 10vw, 4rem); letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
    h1 span { color: var(--accent-current); transition: color 0.4s; }
    
    .subtitle { 
      font-size: 0.8rem; letter-spacing: 0.4em; color: #aaa; 
      border-bottom: 1px solid var(--accent-current); 
      padding-bottom: 0.5rem; margin-top: 1rem; text-transform: uppercase;
    }
    
    .counter { 
      font-size: 1.8rem; margin-top: 2rem; color: var(--accent-current); 
      font-family: 'Playfair Display', serif; transition: color 0.4s;
    }
    
    .gesture-indicator { 
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
      background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 30px; 
      z-index: 100; font-size: 0.7rem; border: 1px solid var(--accent-current);
      backdrop-filter: blur(5px); color: #888; letter-spacing: 0.1em;
    }

    /* Video invisible pero necesario para el procesamiento */
    #video-feed { position: fixed; opacity: 0; pointer-events: none; width: 1px; height: 1px; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="content">
    <h1>ELADIO <span>✦</span> PAOLA</h1>
    <div class="subtitle">NUESTRO TIEMPO JUNTOS</div>
    <div class="counter" id="counter">Calculando...</div>
  </div>

  <div class="gesture-indicator">
    ELADIO: <span id="gesture-name" style="font-weight:bold; color: var(--accent-current);">ESPERANDO...</span>
  </div>

  <video id="video-feed" playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    (function() {
      const startDate = new Date(2025, 7, 6);
      const bgCanvas = document.getElementById('bg-canvas');
      const ctx = bgCanvas.getContext('2d');
      const gestureNameSpan = document.getElementById('gesture-name');
      const videoElement = document.getElementById('video-feed');

      let particles = [];
      let isMorphing = false;
      let currentAccent = "#D4AF37";

      function initParticles() {
        particles = [];
        for (let i = 0; i < 280; i++) {
          particles.push({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            tx: 0, ty: 0,
            vx: (Math.random() - 0.5) * 1.6,
            vy: (Math.random() - 0.5) * 1.6,
            radius: Math.random() * 2.5 + 0.5,
            alpha: Math.random() * 0.5 + 0.3
          });
        }
      }

      function setMorph(shape) {
        isMorphing = (shape !== 'none');
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        
        particles.forEach((p, i) => {
          let angle = (i / particles.length) * Math.PI * 2;
          if (shape === 'HEART') {
            currentAccent = "#FFB7C5";
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));
            p.tx = cx + x * 16; p.ty = cy + y * 16;
          } else if (shape === 'STAR') {
            currentAccent = "#FFFACD";
            let r = (i % 2 === 0) ? 230 : 100;
            p.tx = cx + r * Math.cos(angle - Math.PI/2); p.ty = cy + r * Math.sin(angle - Math.PI/2);
          } else {
            currentAccent = "#D4AF37";
          }
        });
        document.documentElement.style.setProperty('--accent-current', currentAccent);
      }

      const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
      });

      hands.setOptions({
        maxNumHands: 1,
        modelComplexity: 1,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
      });

      hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          const landmarks = results.multiHandLandmarks[0];
          const thumb = landmarks[4], index = landmarks[8], middle = landmarks[12];
          
          const distThumbIndex = Math.hypot(thumb.x - index.x, thumb.y - index.y);
          const indexUp = index.y < landmarks[6].y;
          const middleDown = middle.y > landmarks[10].y;

          if (distThumbIndex < 0.08) {
            gestureNameSpan.innerText = "CORAZÓN PARA PAOLA";
            setMorph('HEART');
          } else if (indexUp && middleDown) {
            gestureNameSpan.innerText = "UNA ESTRELLA PARA TI";
            setMorph('STAR');
          } else {
            gestureNameSpan.innerText = "MANO DETECTADA";
            setMorph('none');
          }
        } else {
          gestureNameSpan.innerText = "BUSCANDO TU MANO...";
          setMorph('none');
        }
      });

      const camera = new Camera(videoElement, {
        onFrame: async () => { await hands.send({image: videoElement}); },
        width: 640, height: 480
      });

      camera.start();

      function animate() {
        ctx.fillStyle = 'rgba(10, 10, 10, 0.35)';
        ctx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        
        particles.forEach(p => {
          if (isMorphing) {
            p.x += (p.tx - p.x) * 0.14;
            p.y += (p.ty - p.y) * 0.14;
          } else {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > window.innerWidth) p.vx *= -1;
            if (p.y < 0 || p.y > window.innerHeight) p.vy *= -1;
          }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = currentAccent;
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }

      function updateCounter() {
        const diff = new Date() - startDate;
        const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
        const months = Math.floor(totalDays / 30.44);
        const days = Math.floor(totalDays % 30.44);
        document.getElementById('counter').innerHTML = `<b>${months}</b> meses y <b>${days}</b> días`;
      }

      window.addEventListener('resize', () => {
        bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
        initParticles();
      });

      bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
      initParticles();
      animate();
      updateCounter();
      setInterval(updateCounter, 1000 * 60 * 60);
    })();
  </script>
</body>
</html>
