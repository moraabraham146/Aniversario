<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para Paola - Mesiversario</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; overflow: hidden; font-family: 'Arial', sans-serif; }
        .instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.5); font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="instructions">Haz clic o toca para cambiar el mensaje de partículas</div>

<script>
let font;
let points = [];
let particles = [];
let currentTextIndex = 0;
// Lista de gestos/palabras que mencionaste
const texts = ["PAOLA", "ELADIO", "06/08/25", "❤", "SIEMPRE"];

function preload() {
  // Cargamos una fuente gruesa para que las partículas se vean bien
  font = loadFont('https://cdnjs.cloudflare.com/ajax/libs/topcoat/0.8.0/font/SourceCodePro-Bold.otf');
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  loadParticles(texts[currentTextIndex]);
}

function draw() {
  background(10, 10, 20, 40); // Efecto de estela (trail)
  
  for (let i = 0; i < particles.length; i++) {
    particles[i].update();
    particles[i].show();
  }
}

function mousePressed() {
  currentTextIndex = (currentTextIndex + 1) % texts.length;
  loadParticles(texts[currentTextIndex]);
}

function loadParticles(t) {
  // Convertimos texto a puntos
  let pts = font.textToPoints(t, width/2 - 300, height/2 + 50, 150, {
    sampleFactor: 0.15 // Densidad de partículas
  });
  
  // Si hay más puntos nuevos que partículas existentes, creamos más
  if (pts.length > particles.length) {
    for (let i = particles.length; i < pts.length; i++) {
      particles.push(new Particle());
    }
  }
  
  // Asignamos nuevos objetivos a las partículas
  for (let i = 0; i < particles.length; i++) {
    if (i < pts.length) {
      particles[i].setTarget(pts[i].x, pts[i].y);
    } else {
      // Las que sobran se dispersan
      particles[i].setTarget(random(width), random(height));
    }
  }
}

class Particle {
  constructor() {
    this.pos = createVector(random(width), random(height));
    this.target = createVector(this.pos.x, this.pos.y);
    this.vel = p5.Vector.random2D();
    this.acc = createVector();
    this.size = random(2, 5);
    this.color = color(255, 100, 150); // Color romántico
  }

  setTarget(x, y) {
    this.target.set(x, y);
  }

  update() {
    // Lógica de llegada suave (Steering behaviors)
    let steer = p5.Vector.sub(this.target, this.pos);
    steer.mult(0.05); 
    this.acc.add(steer);
    this.vel.add(this.acc);
    this.vel.mult(0.9); // Fricción
    this.pos.add(this.vel);
    this.acc.mult(0);
  }

  show() {
    stroke(this.color);
    strokeWeight(this.size);
    point(this.pos.x, this.pos.y);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
