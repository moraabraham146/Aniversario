<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eladio & Paola | ∞</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --accent: #D4AF37;
            --bg: #050505;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            width: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: var(--accent);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 3rem;
        }

        /* --- Contador Progresivo --- */
        .timer {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .timer-unit {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            min-width: 100px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .timer-unit span {
            display: block;
            font-size: 2.5rem;
            font-weight: 600;
            color: #fff;
        }

        .timer-unit label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        /* --- UI de Gestos --- */
        #video-wrap {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 180px;
            height: 135px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.4);
            z-index: 100;
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #input_video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .gesture-badge {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 800;
            white-space: nowrap;
        }

        #love-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            color: var(--accent);
            pointer-events: none;
            opacity: 0;
            transition: all 0.6s ease;
            z-index: 50;
        }

        .init-btn {
            position: fixed;
            bottom: 50px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            z-index: 101;
            font-family: inherit;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.4s;
        }

        .init-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <h1 id="names">Eladio & Paola</h1>
        <div class="subtitle">Nuestro tiempo juntos</div>
        
        <div class="timer" id="main-timer">
            <div class="timer-unit"><span id="y">-</span><label>Años</label></div>
            <div class="timer-unit"><span id="m">-</span><label>Meses</label></div>
            <div class="timer-unit"><span id="d">-</span><label>Días</label></div>
            <div class="timer-unit"><span id="h">-</span><label>Horas</label></div>
            <div class="timer-unit"><span id="min">-</span><label>Min</label></div>
            <div class="timer-unit"><span id="s">-</span><label>Seg</label></div>
        </div>
    </div>

    <div id="love-overlay"></div>

    <button class="init-btn" id="start-btn">Comenzar Experiencia</button>

    <div id="video-wrap" style="display: none;">
        <video id="input_video"></video>
        <div class="gesture-badge" id="g-status">SISTEMA OFF</div>
    </div>

    <script>
        /** CONFIGURACIÓN **/
        const startDate = new Date('2025-08-06T00:00:00');
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const phrases = ["Eres mi vida", "Te amo hoy más que ayer", "Eres perfecta", "Nuestro amor es infinito", "Juntos siempre"];
        
        let stars = [];
        let trail = [];
        let hearts = [];
        let currentAccent = "#D4AF37";
        let isPaused = false;
        let scale = 1;

        /** MOTOR DE PARTÍCULAS MEJORADO **/
        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5;
                this.baseOpacity = Math.random() * 0.5 + 0.2;
                this.velocity = Math.random() * 0.3 + 0.1;
            }
            draw() {
                ctx.fillStyle = currentAccent;
                ctx.globalAlpha = this.baseOpacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                this.y -= this.velocity;
                if (this.y < -10) this.y = canvas.height + 10;
            }
        }

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({length: 150}, () => new Star());
        }

        function animate() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrellas de fondo
            stars.forEach(s => s.draw());

            // Rastro de luz (Gesto Apuntar)
            if(!isPaused) {
                trail.forEach((p, i) => {
                    ctx.globalAlpha = p.a;
                    ctx.fillStyle = currentAccent;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                    p.a -= 0.02;
                    if(p.a <= 0) trail.splice(i, 1);
                });
            }

            // Explosión de Corazones
            hearts.forEach((h, i) => {
                ctx.globalAlpha = h.a;
                ctx.font = `${h.s}px serif`;
                ctx.fillText("❤️", h.x, h.y);
                h.y += h.vy;
                h.x += h.vx;
                h.a -= 0.01;
                if(h.a <= 0) hearts.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        /** LÓGICA DEL CONTADOR (PROGRESIVO) **/
        function updateTime() {
            const now = new Date();
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            const diff = now - startDate;
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('y').innerText = years;
            document.getElementById('m').innerText = months;
            document.getElementById('d').innerText = days;
            document.getElementById('h').innerText = hours;
            document.getElementById('min').innerText = mins;
            document.getElementById('s').innerText = secs;
        }

        /** VISIÓN ARTIFICIAL (MEDIAPIPE) **/
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.7 });

        function detectGestures(landmarks) {
            const up = (i) => landmarks[i].y < landmarks[i-2].y;
            const thumb = landmarks[4].x < landmarks[3].x; // Simplificado para mano derecha

            if (up(8) && up(12) && up(16) && up(20)) return "PALMA";
            if (!up(8) && !up(12) && !up(16) && !up(20)) return "PUÑO";
            if (up(8) && up(12) && !up(16)) return "VICTORIA";
            if (landmarks[4].y < landmarks[3].y && !up(8)) return "PULGAR";
            if (up(8) && !up(12)) return "APUNTAR";
            return "...";
        }

        let lastAction = 0;
        hands.onResults(results => {
            const status = document.getElementById('g-status');
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                status.innerText = "ESPERANDO MANO";
                return;
            }

            const lm = results.multiHandLandmarks[0];
            const gesture = detectGestures(lm);
            status.innerText = gesture;

            const now = Date.now();
            if(now - lastAction < 600 && gesture !== "APUNTAR") return;

            if(gesture === "PALMA") {
                isPaused = !isPaused;
                lastAction = now;
            } else if(gesture === "PUÑO") {
                const palette = ["#D4AF37", "#E0115F", "#FFFFFF", "#FFD700"];
                currentAccent = palette[Math.floor(Math.random()*palette.length)];
                document.documentElement.style.setProperty('--accent', currentAccent);
                lastAction = now;
            } else if(gesture === "VICTORIA") {
                const overlay = document.getElementById('love-overlay');
                overlay.innerText = phrases[Math.floor(Math.random()*phrases.length)];
                overlay.style.opacity = 1;
                setTimeout(() => overlay.style.opacity = 0, 2000);
                lastAction = now;
            } else if(gesture === "PULGAR") {
                scale = scale > 1.3 ? 1 : scale + 0.1;
                document.getElementById('main-timer').style.transform = `scale(${scale})`;
                lastAction = now;
            } else if(gesture === "APUNTAR") {
                for(let i=0; i<5; i++) {
                    trail.push({ x: (1-lm[8].x)*canvas.width, y: lm[8].y*canvas.height, r: Math.random()*5, a: 1 });
                }
            }
        });

        // Iniciar cámara
        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('video-wrap').style.display = 'block';
            const videoElement = document.getElementById('input_video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            videoElement.play();
            
            const runDetection = async () => {
                await hands.send({image: videoElement});
                requestAnimationFrame(runDetection);
            };
            runDetection();
            
            // Efecto especial al iniciar (Corazones)
            for(let i=0; i<30; i++) {
                hearts.push({
                    x: canvas.width/2, y: canvas.height/2,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    s: Math.random()*30+10, a: 1
                });
            }
        };

        window.addEventListener('resize', initStars);
        initStars();
        animate();
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
