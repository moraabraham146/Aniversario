<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eladio & Paola | Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --accent: #D4AF37; /* Dorado */
            --bg: #050505;
            --text: #ffffff;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-box: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- Canvas Background --- */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* --- UI Components --- */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            width: 90%;
            max-width: 800px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: var(--transition);
        }

        .timer {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
            transition: var(--transition);
        }

        .timer-unit {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 25px;
            border-radius: 8px;
            min-width: 80px;
            backdrop-filter: blur(10px);
        }

        .timer-unit span {
            display: block;
            font-size: 2rem;
            font-weight: 600;
        }

        .timer-unit label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        .next-milestone {
            margin-top: 3rem;
            font-style: italic;
            font-family: 'Playfair Display', serif;
            opacity: 0.8;
        }

        /* --- Camera & Gestures --- */
        #video-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 120px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--accent);
            z-index: 100;
            background: #000;
        }

        #input_video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; }

        #gesture-indicator {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            white-space: nowrap;
        }

        #love-msg {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--accent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 50;
        }

        .camera-btn {
            position: fixed;
            bottom: 30px;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            z-index: 100;
            font-family: inherit;
            transition: 0.3s;
        }

        .camera-btn:hover { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="content">
        <h1 id="main-title">Eladio & Paola</h1>
        <p style="letter-spacing: 5px; opacity: 0.7;">DESDE EL 06 DE AGOSTO, 2025</p>
        
        <div class="timer" id="timer">
            <div class="timer-unit"><span id="months">-</span><label>Meses</label></div>
            <div class="timer-unit"><span id="days">-</span><label>Días</label></div>
            <div class="timer-unit"><span id="hours">-</span><label>Hrs</label></div>
            <div class="timer-unit"><span id="mins">-</span><label>Min</label></div>
            <div class="timer-unit"><span id="secs">-</span><label>Seg</label></div>
        </div>

        <div class="next-milestone" id="milestone-text">
            Preparando nuestro próximo mes juntos...
        </div>
    </div>

    <div id="love-msg"></div>

    <button class="camera-btn" id="start-cam">Activar Control por Gestos</button>

    <div id="video-container" style="display: none;">
        <video id="input_video"></video>
        <div id="gesture-indicator">Buscando mano...</div>
    </div>

    <script>
        /** 1. CONFIGURACIÓN Y CONSTANTES **/
        const startDate = new Date('2025-08-06T00:00:00');
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const loveMsg = document.getElementById('love-msg');
        let particles = [];
        let confetti = [];
        let isConfettiPaused = false;
        let scaleFactor = 1;
        const phrases = ["Eres mi mundo", "Por mil meses más", "Te amo infinito", "Mi lugar favorito", "Contigo siempre"];

        /** 2. SISTEMA DE PARTÍCULAS (FONDO) **/
        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 10000);
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent');
            
            particles.forEach(p => {
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;
            });

            if(!isConfettiPaused) drawConfetti();
            requestAnimationFrame(drawParticles);
        }

        function drawConfetti() {
            confetti.forEach((c, i) => {
                ctx.globalAlpha = c.alpha;
                ctx.fillStyle = c.color;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
                ctx.fill();
                c.y += c.sy;
                c.x += c.sx;
                c.alpha -= 0.01;
                if(c.alpha <= 0) confetti.splice(i, 1);
            });
        }

        /** 3. CÁLCULO DE TIEMPO **/
        function updateTimer() {
            const now = new Date();
            let diff = now - startDate;

            const months = Math.floor(diff / (1000 * 60 * 60 * 24 * 30.44));
            const days = Math.floor((diff / (1000 * 60 * 60 * 24)) % 30.44);
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = days;
            document.getElementById('hours').innerText = hours;
            document.getElementById('mins').innerText = mins;
            document.getElementById('secs').innerText = secs;

            const nextMilestone = new Date(startDate);
            nextMilestone.setMonth(startDate.getMonth() + months + 1);
            const daysLeft = Math.ceil((nextMilestone - now) / (1000 * 60 * 60 * 24));
            document.getElementById('milestone-text').innerText = `Faltan ${daysLeft} días para nuestro siguiente mesiversario.`;
        }

        /** 4. GESTOS CON MEDIAPIPE **/
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-cam');
        const indicator = document.getElementById('gesture-indicator');

        function onResults(results) {
            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                indicator.innerText = "Buscando mano...";
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const gesture = detectGesture(landmarks);
            indicator.innerText = "Gesto: " + gesture;
            executeAction(gesture, landmarks);
        }

        function detectGesture(lm) {
            // Lógica simplificada de detección de dedos
            const thumbUp = lm[4].y < lm[3].y && lm[4].y < lm[2].y;
            const indexUp = lm[8].y < lm[6].y;
            const middleUp = lm[12].y < lm[10].y;
            const ringUp = lm[16].y < lm[14].y;
            const pinkyUp = lm[20].y < lm[18].y;

            if (indexUp && middleUp && !ringUp && !pinkyUp) return "VICTORIA";
            if (indexUp && !middleUp && !ringUp && !pinkyUp) return "APUNTAR";
            if (thumbUp && !indexUp && !middleUp && !ringUp) return "PULGAR_ARRIBA";
            if (!indexUp && !middleUp && !ringUp && !pinkyUp) return "PUÑO";
            if (indexUp && middleUp && ringUp && pinkyUp) return "PALMA";
            
            // Detección Corazón (Puntas de índices y pulgares cerca)
            return "TRACKING...";
        }

        let lastGestureTime = 0;
        function executeAction(gesture, lm) {
            const now = Date.now();
            if (now - lastGestureTime < 500 && gesture !== "APUNTAR") return;

            switch(gesture) {
                case "PALMA":
                    isConfettiPaused = !isConfettiPaused;
                    lastGestureTime = now;
                    break;
                case "PUÑO":
                    const colors = ["#D4AF37", "#FF69B4", "#00F5FF", "#FFFFFF"];
                    const randomColor = colors[Math.floor(Math.random()*colors.length)];
                    document.documentElement.style.setProperty('--accent', randomColor);
                    lastGestureTime = now;
                    break;
                case "VICTORIA":
                    loveMsg.innerText = phrases[Math.floor(Math.random()*phrases.length)];
                    loveMsg.style.opacity = 1;
                    setTimeout(() => loveMsg.style.opacity = 0, 2000);
                    lastGestureTime = now;
                    break;
                case "PULGAR_ARRIBA":
                    scaleFactor = scaleFactor >= 1.5 ? 1 : scaleFactor + 0.1;
                    document.getElementById('timer').style.transform = `scale(${scaleFactor})`;
                    lastGestureTime = now;
                    break;
                case "APUNTAR":
                    const x = (1 - lm[8].x) * canvas.width;
                    const y = lm[8].y * canvas.height;
                    createTrail(x, y);
                    break;
            }
        }

        function createTrail(x, y) {
            for(let i=0; i<3; i++) {
                confetti.push({
                    x: x, y: y,
                    r: Math.random() * 4,
                    color: getComputedStyle(document.documentElement).getPropertyValue('--accent'),
                    sx: (Math.random() - 0.5) * 2,
                    sy: (Math.random() - 0.5) * 2,
                    alpha: 1
                });
            }
        }

        /** 5. INICIALIZACIÓN **/
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        startBtn.onclick = async () => {
            startBtn.style.display = 'none';
            document.getElementById('video-container').style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            videoElement.play();
            
            async function detectionLoop() {
                await hands.send({image: videoElement});
                requestAnimationFrame(detectionLoop);
            }
            detectionLoop();
        };

        window.addEventListener('resize', initCanvas);
        initCanvas();
        drawParticles();
        setInterval(updateTimer, 1000);
        updateTimer();

    </script>
</body>
</html>
