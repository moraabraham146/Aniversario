<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>E & P - Feliz Cumple Mes</title>
    <style>
        :root { --pink: #ff1493; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        #ui {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 0; right: 0; bottom: env(safe-area-inset-bottom, 20px);
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; pointer-events: none; z-index: 10; padding: 20px;
        }

        h1 { 
            font-size: clamp(1.8rem, 10vw, 3.5rem); color: white; margin: 0;
            text-shadow: 0 0 15px var(--pink); letter-spacing: 3px; text-align: center;
        }

        #status { 
            font-size: 1rem; color: #ff69b4; background: rgba(0,0,0,0.7);
            padding: 8px 20px; border-radius: 20px; border: 1px solid var(--pink);
        }

        #input_video { display: none; }
        
        /* Pantalla de Inicio / Loader */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        button {
            padding: 15px 40px; font-size: 1.2rem; background: var(--pink);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px var(--pink); transition: 0.3s;
        }

        button:hover { transform: scale(1.1); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="color: var(--pink); margin-bottom: 30px;">Sorpresa para Paola</h2>
    <p style="margin-bottom: 20px; opacity: 0.8;">Para disfrutar la magia interactiva,<br>necesitamos activar tu cámara.</p>
    <button id="startBtn">COMENZAR</button>
</div>

<div id="ui" class="hidden">
    <div class="header"><h1>ELADIO & PAOLA</h1></div>
    <div class="footer"><p id="status">Mueve tu mano frente a la pantalla</p></div>
</div>

<video id="input_video" playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const videoElement = document.getElementById('input_video');
    const statusText = document.getElementById('status');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('startBtn');
    const ui = document.getElementById('ui');

    let scene, camera, renderer, points;
    const count = 15000;
    let targetPositions = { heart: [], random: [], date: [] };
    let currentMode = 'random';

    // 1. Inicialización de Gráficos
    function initThree() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 400;

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BufferGeometry();
        const posArr = new Float32Array(count * 3);
        const colArr = new Float32Array(count * 3);

        for (let i = 0; i < count; i++) {
            posArr[i*3] = (Math.random() - 0.5) * 1000;
            posArr[i*3+1] = (Math.random() - 0.5) * 1000;
            posArr[i*3+2] = (Math.random() - 0.5) * 500;
            colArr[i*3] = 1; colArr[i*3+1] = 0.1; colArr[i*3+2] = 0.5;
            
            // Generar formas
            const t = Math.random() * Math.PI * 2;
            const xH = 16 * Math.pow(Math.sin(t), 3) * 12;
            const yH = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 12;
            targetPositions.heart.push(new THREE.Vector3(xH, yH, 0));
            targetPositions.date.push(new THREE.Vector3((Math.random()-0.5)*550, (Math.random()-0.5)*30, 0));
            targetPositions.random.push(new THREE.Vector3((Math.random()-0.5)*900, (Math.random()-0.5)*700, (Math.random()-0.5)*400));
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colArr, 3));
        points = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 2.2, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true }));
        scene.add(points);
        animate();
    }

    // 2. Lógica de Gestos
    const hands = new Hands({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    hands.onResults((results) => {
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const isIndexUp = l[8].y < l[6].y;
            const isMiddleUp = l[12].y < l[10].y;

            if (isIndexUp && isMiddleUp) {
                currentMode = 'heart';
                statusText.innerText = "❤️ Feliz Cumple Mes ❤️";
            } else if (isIndexUp) {
                currentMode = 'date';
                statusText.innerText = "Nuestra Fecha: 08/06/2025";
            } else {
                currentMode = 'random';
                statusText.innerText = "Controlando el destino...";
            }

            points.position.x += ((l[9].x - 0.5) * -700 - points.position.x) * 0.1;
            points.position.y += ((l[9].y - 0.5) * -500 - points.position.y) * 0.1;
        }
    });

    // 3. Control de Inicio
    startBtn.addEventListener('click', () => {
        overlay.innerHTML = "<h2>Cargando Modelos de IA...</h2>";
        
        const cameraCtrl = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
                if(!ui.classList.contains('hidden')) return;
                overlay.classList.add('hidden');
                ui.classList.remove('hidden');
            },
            width: 640, height: 480
        });
        
        cameraCtrl.start().catch(err => {
            overlay.innerHTML = "<h2>Error de Cámara</h2><p>Por favor, recarga y permite el acceso.</p>";
        });
    });

    function animate() {
        requestAnimationFrame(animate);
        const pos = points.geometry.attributes.position.array;
        const target = targetPositions[currentMode];
        for (let i = 0; i < count; i++) {
            const i3 = i * 3;
            pos[i3] += (target[i].x - pos[i3]) * 0.1;
            pos[i3+1] += (target[i].y - pos[i3+1]) * 0.1;
            pos[i3+2] += (target[i].z - pos[i3+2]) * 0.1;
        }
        points.geometry.attributes.position.needsUpdate = true;
        points.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    initThree();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
