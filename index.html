<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Feliz Cumple Mes - E&P</title>
    <style>
        :root { --accent: #ff1493; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #ui {
            position: absolute;
            /* Margen dinámico para móviles (Safe Area) */
            top: env(safe-area-inset-top, 20px);
            left: env(safe-area-inset-left, 20px);
            right: env(safe-area-inset-right, 20px);
            bottom: env(safe-area-inset-bottom, 20px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
            padding: 20px;
        }

        .header h1 { 
            font-size: clamp(1.5rem, 8vw, 3rem); 
            margin: 0; 
            text-shadow: 0 0 20px var(--accent); 
            letter-spacing: 4px;
            color: white;
            text-align: center;
        }

        .footer #status { 
            font-size: clamp(1rem, 4vw, 1.4rem); 
            color: #ff69b4; 
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid var(--accent);
        }

        video { display: none; }
        
        .loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: var(--accent); display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }

        .heart-spinner {
            width: 50px; height: 50px; border: 3px solid var(--accent);
            border-radius: 50%; border-top-color: transparent;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="heart-spinner"></div>
    <p>Iniciando Experiencia...</p>
</div>

<div id="ui">
    <div class="header">
        <h1 id="title">ELADIO & PAOLA</h1>
    </div>
    <div class="footer">
        <p id="status">Mueve tu mano para empezar</p>
    </div>
</div>

<video id="input_video" playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const videoElement = document.getElementById('input_video');
    const statusText = document.getElementById('status');
    const loader = document.getElementById('loader');
    
    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.position.z = 450;

    const count = 18000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);

    for (let i = 0; i < count; i++) {
        positions[i*3] = (Math.random() - 0.5) * 1000;
        positions[i*3+1] = (Math.random() - 0.5) * 1000;
        positions[i*3+2] = (Math.random() - 0.5) * 500;
        colors[i*3] = 1; colors[i*3+1] = 0.1; colors[i*3+2] = 0.6;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    const points = new THREE.Points(geometry, new THREE.PointsMaterial({ size: 2, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8 }));
    scene.add(points);

    // Formas precalculadas
    const shapes = { heart: [], random: [], date: [] };
    for (let i = 0; i < count; i++) {
        const t = Math.random() * Math.PI * 2;
        shapes.heart.push(new THREE.Vector3(16 * Math.pow(Math.sin(t), 3) * 12, (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 12, 0));
        shapes.date.push(new THREE.Vector3((Math.random()-0.5)*500, (Math.random()-0.5)*30, (Math.random()-0.5)*20));
        shapes.random.push(new THREE.Vector3((Math.random()-0.5)*1000, (Math.random()-0.5)*800, (Math.random()-0.5)*400));
    }

    let currentShape = 'random';

    // --- MEDIAPIPE SETUP ---
    const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
    hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });

    hands.onResults((results) => {
        loader.style.display = 'none';
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            const l = results.multiHandLandmarks[0];
            const isIndexUp = l[8].y < l[6].y;
            const isMiddleUp = l[12].y < l[10].y;
            const isPinkyUp = l[20].y < l[18].y;

            if (isIndexUp && isMiddleUp && !isPinkyUp) {
                currentShape = 'heart';
                statusText.innerText = "❤️ Feliz Cumple Mes ❤️";
            } else if (isIndexUp && !isMiddleUp) {
                currentShape = 'date';
                statusText.innerText = "Nuestra Fecha: 08/06/2025";
            } else {
                currentShape = 'random';
                statusText.innerText = "¡Mueve la magia!";
            }

            // Movimiento suave siguiendo la mano (invirtiendo X para efecto espejo)
            points.position.x += ((l[9].x - 0.5) * -700 - points.position.x) * 0.15;
            points.position.y += ((l[9].y - 0.5) * -500 - points.position.y) * 0.15;
        }
    });

    const cam = new Camera(videoElement, {
        onFrame: async () => { await hands.send({ image: videoElement }); },
        width: 640, height: 480
    });
    cam.start();

    // --- LOOP ---
    function animate() {
        requestAnimationFrame(animate);
        const pos = points.geometry.attributes.position.array;
        const target = shapes[currentShape];
        for (let i = 0; i < count; i++) {
            const i3 = i * 3;
            pos[i3] += (target[i].x - pos[i3]) * 0.1;
            pos[i3+1] += (target[i].y - pos[i3+1]) * 0.1;
            pos[i3+2] += (target[i].z - pos[i3+2]) * 0.1;
        }
        points.geometry.attributes.position.needsUpdate = true;
        points.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
