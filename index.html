    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #D4AF37;
            --secondary-gold: #FFD700;
            --text-light: #FFFFFF;
            --text-dim: #B8B8B8;
            --bg-dark: #0A0A0A;
            --accent-color: var(--primary-gold);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Safe Areas */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
                padding-top: max(1rem, env(safe-area-inset-top));
                padding-bottom: max(1rem, env(safe-area-inset-bottom));
            }
        }

        /* Canvas Background */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out;
        }

        .names {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: all 0.3s ease;
        }

        .names.large {
            transform: scale(1.2);
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-dim);
            font-weight: 300;
        }

        /* Time Counter */
        .time-counter {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            animation: fadeInUp 1.2s ease-out;
            transition: all 0.3s ease;
        }

        .time-counter.large {
            transform: scale(1.1);
            padding: 2.5rem;
        }

        .time-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 1.5rem;
            text-align: center;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
        }

        .time-value {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            font-weight: 600;
            color: var(--accent-color);
            font-family: 'Playfair Display', serif;
        }

        .time-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Next Milestone */
        .milestone {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInUp 1.4s ease-out;
        }

        .milestone-text {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .milestone-date {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--accent-color);
        }

        /* Camera Controls */
        .camera-controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 1rem;
        }

        .btn {
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn.active {
            background: var(--accent-color);
            color: var(--bg-dark);
        }

        /* Gesture Indicator */
        .gesture-indicator {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent-color);
            border-radius: 10px;
            padding: 1rem;
            z-index: 100;
            backdrop-filter: blur(10px);
            min-width: 200px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gesture-indicator.active {
            opacity: 1;
        }

        .gesture-label {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }

        .gesture-name {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
        }

        /* Video Preview */
        #videoElement {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 200px;
            height: 150px;
            border-radius: 10px;
            border: 2px solid var(--accent-color);
            z-index: 99;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        #videoElement:hover {
            opacity: 0.8;
        }

        /* Love Message */
        .love-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--accent-color);
            border-radius: 20px;
            padding: 2rem 3rem;
            z-index: 200;
            text-align: center;
            backdrop-filter: blur(20px);
            animation: messagePopup 3s ease-out forwards;
        }

        @keyframes messagePopup {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            20% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
            30% {
                transform: translate(-50%, -50%) scale(1);
            }
