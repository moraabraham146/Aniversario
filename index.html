<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eladio & Paola | ∞</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --accent: #D4AF37; /* Dorado Base */
            --bg: #030303;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* --- UI Overlay --- */
        .ui-container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 7vw, 3.5rem);
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-bottom: 0.2rem;
            transition: color 0.5s ease;
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.5;
            color: #fff;
            margin-bottom: 8vh;
        }

        /* --- Mensaje Bonito --- */
        #love-message {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-style: italic;
            color: var(--accent);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            max-width: 80%;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        #love-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- UI de Gestos (Cámara) --- */
        #video-wrap {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 150px;
            height: 112px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 100;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: border-color 0.5s ease;
        }

        #input_video { transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }

        .gesture-badge {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            border: 1px solid var(--accent);
        }

        .init-btn {
            position: fixed;
            bottom: 50px;
            padding: 16px 40px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            z-index: 101;
            font-family: inherit;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: all 0.4s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .init-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="ui-container">
        <h1 id="main-title">Eladio & Paola</h1>
        <div class="subtitle">06 de Agosto 2025</div>
        
        <div id="love-message">Haz un gesto con la mano para empezar...</div>
    </div>

    <button class="init-btn" id="start-btn">Iniciar Experiencia</button>

    <div id="video-wrap" style="display: none;">
        <video id="input_video"></video>
        <div class="gesture-badge" id="g-status">SISTEMA OFF</div>
    </div>

    <script>
        /** --- CONFIGURACIÓN GENERATIVA --- **/
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        const loveMsg = document.getElementById('love-message');
        const PARTICLE_COUNT = 1500; // Aumentado para formas definidas
        
        let particles = [];
        let targetPoints = [];
        let currentShape = 'STARS';
        let lastGesture = '';
        let currentAccent = "#D4AF37"; // Dorado inicial

        const gesturesMap = {
            'CORAZON': { 
                color: '#E0115F', // Rubí
                messages: ["Mi corazón es tuyo, Paola", "Lates en cada rincón de mi ser", "Contigo, mi mundo está completo"]
            },
            'FLOR': { 
                color: '#FF69B4', // Rosa
                messages: ["Nuestra amor florece cada día", "Eres la flor más bella", "Cultivando sueños juntos"]
            },
            'INFINITO': { 
                color: '#FFFFFF', // Blanco Pureza
                messages: ["Nuestro amor no tiene fin", "Por siempre y para siempre", "Más allá del tiempo"]
            },
            'PALMA': { 
                color: '#D4AF37', // Dorado
                messages: ["Nuestra historia es polvo estelar", "Iluminas mi oscuridad", "Viajando juntos por el universo"]
            }
        };

        /** --- MOTOR DE GEOMETRÍA DE PARTÍCULAS --- **/
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.tx = this.x; // Target X
                this.ty = this.y; // Target Y
                this.size = Math.random() * 1.8 + 0.2;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
                this.acc = 0.05; // Aceleración hacia el target
                this.friction = 0.96;
            }

            update() {
                // Física sutil hacia el punto objetivo (Target)
                let dx = this.tx - this.x;
                let dy = this.ty - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 1) {
                    this.vx += dx * this.acc * (this.size / 2);
                    this.vy += dy * this.acc * (this.size / 2);
                } else {
                    // Movimiento errático sutil cuando está en posición
                    this.vx += (Math.random() - 0.5) * 0.1;
                    this.vy += (Math.random() - 0.5) * 0.1;
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = currentAccent;
            particles = Array.from({length: PARTICLE_COUNT}, () => new Particle());
            defineShape('PALMA'); // Forma inicial: Lluvia estelar
        }

        // --- DEFINICIÓN DE GEOMETRÍAS ---
        function defineShape(shape) {
            currentShape = shape;
            targetPoints = [];
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const scale = Math.min(canvas.width, canvas.height) * 0.4; // Escala relativa

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let t = (i / PARTICLE_COUNT) * Math.PI * 2;
                let tx, ty;

                switch(shape) {
                    case 'CORAZON':
                        tx = cx + 16 * Math.sin(t)**3 * (scale / 18);
                        ty = cy - (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * (scale / 18);
                        break;
                    case 'FLOR':
                        let k = 5; // Número de pétalos
                        let r = Math.cos(k * t) * scale * 0.8;
                        tx = cx + r * Math.cos(t);
                        ty = cy + r * Math.sin(t);
                        break;
                    case 'INFINITO':
                        tx = cx + (scale * Math.cos(t)) / (1 + Math.sin(t)**2);
                        ty = cy + (scale * Math.sin(t) * Math.cos(t)) / (1 + Math.sin(t)**2);
                        break;
                    default: // PALMA / STARS: Lluvia vertical
                        tx = Math.random() * canvas.width;
                        ty = Math.random() * canvas.height;
                }
                
                // Asignar target aleatorio a cada partícula para evitar orden
                let pIndex = Math.floor(Math.random() * particles.length);
                particles[i].tx = tx;
                particles[i].ty = ty;
            }
        }

        function animate() {
            // Fondo con rastro sutil (motion blur)
            ctx.fillStyle = 'rgba(3, 3, 3, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar partículas con el acento actual
            ctx.fillStyle = currentAccent;
            ctx.globalAlpha = 0.8;
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        /** --- VISIÓN ARTIFICIAL (MEDIAPIPE) --- **/
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.85, minTrackingConfidence: 0.8 });

        function detectGestures(landmarks) {
            const up = (i) => landmarks[i].y < landmarks[i-2].y;
            
            // Detección Refinada
            const index = up(8); const middle = up(12); const ring = up(16); const pinky = up(20);
            const thumbUp = landmarks[4].y < landmarks[2].y;

            // Detección Corazón (Unión de índices y pulgares cerca)
            const distPI = Math.hypot(landmarks[4].x - landmarks[8].x, landmarks[4].y - landmarks[8].y);
            
            if (index && middle && ring && pinky && thumbUp) return "PALMA";
            if (!index && !middle && !ring && !pinky) return "INFINITO"; // Puño -> Infinito
            if (index && middle && !ring && !pinky) return "CORAZON"; // Victoria -> Corazón
            if (distPI < 0.06 && !middle) return "FLOR"; // Índice y Pulgar juntos
            
            return "...";
        }

        // Lógica de cambio de mensaje y color
        function handleGestureChange(gesture) {
            if (gesture === '...' || gesture === lastGesture || !gesturesMap[gesture]) return;
            
            lastGesture = gesture;
            const data = gesturesMap[gesture];
            
            // Actualizar Visuales del Canvas
            currentAccent = data.color;
            document.documentElement.style.setProperty('--accent', data.color);
            defineShape(gesture);

            // Actualizar Mensaje Bonito con animación
            loveMsg.classList.remove('show');
            setTimeout(() => {
                loveMsg.innerText = data.messages[Math.floor(Math.random()*data.messages.length)];
                loveMsg.classList.add('show');
            }, 500);
        }

        hands.onResults(results => {
            const status = document.getElementById('g-status');
            const videoWrap = document.getElementById('video-wrap');

            if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                status.innerText = "ESPERANDO MANO";
                videoWrap.style.borderColor = "rgba(255,255,255,0.1)";
                return;
            }

            const lm = results.multiHandLandmarks[0];
            const gesture = detectGestures(lm);
            status.innerText = gesture;
            videoWrap.style.borderColor = currentAccent;

            handleGestureChange(gesture);
        });

        // --- INICIALIZACIÓN ---
        document.getElementById('start-btn').onclick = async () => {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('video-wrap').style.display = 'block';
            const videoElement = document.getElementById('input_video');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
                videoElement.srcObject = stream;
                videoElement.play();
                
                const runDetection = async () => {
                    await hands.send({image: videoElement});
                    requestAnimationFrame(runDetection);
                };
                runDetection();
                
                // Mostrar primer mensaje
                setTimeout(() => loveMsg.classList.add('show'), 1000);

            } catch (err) {
                alert("Necesitamos acceso a la cámara para la experiencia.");
                console.error(err);
            }
        };

        window.addEventListener('resize', initParticles);
        initParticles();
        animate();
    </script>
</body>
</html>
